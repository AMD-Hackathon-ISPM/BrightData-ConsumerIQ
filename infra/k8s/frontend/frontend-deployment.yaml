apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumeriq-frontend
  namespace: consumeriq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumeriq-frontend
  template:
    metadata:
      labels:
        app: consumeriq-frontend
    spec:
      containers:
        - name: frontend
          image: k3d-consumeriq-registry:5000/consumeriq-frontend:local
          imagePullPolicy: Always
          ports:
            - containerPort: 80
