apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumeriq-translator
  namespace: consumeriq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumeriq-translator
  template:
    metadata:
      labels:
        app: consumeriq-translator
    spec:
      containers:
        - name: translator
          image: k3d-consumeriq-registry:5000/consumeriq-translator:local
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "512Mi"
            limits:
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 5
