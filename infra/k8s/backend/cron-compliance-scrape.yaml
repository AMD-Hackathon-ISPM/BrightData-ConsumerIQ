apiVersion: batch/v1
kind: CronJob
metadata:
  name: consumeriq-compliance-scrape
  namespace: consumeriq
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: trigger
              image: curlimages/curl:latest
              command:
                - /bin/sh
                - -c
                - |
                  curl -sS -X POST \
                    -H "X-Admin-Token: $ADMIN_API_TOKEN" \
                    http://consumeriq-api.consumeriq.svc.cluster.local:8000/api/admin/trigger-compliance-scrape
              env:
                - name: ADMIN_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: consumeriq-api-keys
                      key: ADMIN_API_TOKEN
                      optional: true
