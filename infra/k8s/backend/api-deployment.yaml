apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumeriq-api
  namespace: consumeriq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumeriq-api
  template:
    metadata:
      labels:
        app: consumeriq-api
    spec:
      containers:
        - name: api
          image: localhost:5000/consumeriq-backend:local
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_URL
              value: redis://redis.consumeriq.svc.cluster.local:6379/0
            - name: DATABASE_URL
              value: postgresql://consumeriq:consumeriq@postgres.consumeriq.svc.cluster.local:5432/consumeriq
            - name: SCRAPINGBEE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: consumeriq-scrapingbee
                  key: SCRAPINGBEE_API_KEY
