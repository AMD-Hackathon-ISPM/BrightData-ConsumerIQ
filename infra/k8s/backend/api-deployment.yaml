apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumeriq-api
  namespace: consumeriq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumeriq-api
  template:
    metadata:
      labels:
        app: consumeriq-api
    spec:
      containers:
        - name: api
          image: k3d-consumeriq-registry:5000/consumeriq-backend:local
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_URL
              value: redis://redis.consumeriq.svc.cluster.local:6379/0
            - name: DATABASE_URL
              value: postgresql://consumeriq:consumeriq@postgres.consumeriq.svc.cluster.local:5432/consumeriq
            - name: BACKPRESSURE_ENABLED
              value: "false"
            - name: INFERENCE_QUEUE_LIMIT
              value: "20"
            - name: DAILY_REFRESH_ENABLED
              value: "false"
            - name: COMPLIANCE_SCRAPE_ENABLED
              value: "false"
            - name: SIGNAL_TTL_ENABLED
              value: "false"
            - name: SIGNAL_TTL_MONTHS
              value: "4"
            - name: SIGNAL_RECENCY_WEIGHT
              value: "0.005"
            - name: ADMIN_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: consumeriq-admin
                  key: ADMIN_API_TOKEN
                  optional: true
            - name: SCRAPINGBEE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: consumeriq-api-keys
                  key: SCRAPINGBEE_API_KEY
                  optional: true
            - name: BRIGHTDATA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: consumeriq-api-keys
                  key: BRIGHTDATA_API_TOKEN
