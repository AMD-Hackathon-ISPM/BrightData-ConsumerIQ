apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumeriq-worker-inference
  namespace: consumeriq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumeriq-worker-inference
  template:
    metadata:
      labels:
        app: consumeriq-worker-inference
    spec:
      containers:
        - name: worker
          image: k3d-consumeriq-registry:5000/consumeriq-backend:local
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - "celery -A backend.redis.worker.celeryApp worker -Q inference,synthesis --concurrency=${INFERENCE_CONCURRENCY:-1} -l info"
          env:
            - name: INFERENCE_CONCURRENCY
              value: "2"
            - name: BACKPRESSURE_ENABLED
              value: "false"
            - name: SIGNAL_RECENCY_WEIGHT
              value: "0.005"
            - name: OPENAI_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: consumeriq-api-keys
                  key: OPENAI_BASE_URL
                  optional: true
            - name: OPENAI_MODEL
              valueFrom:
                secretKeyRef:
                  name: consumeriq-api-keys
                  key: OPENAI_MODEL
                  optional: true
            - name: CHAT_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: consumeriq-api-keys
                  key: CHAT_BASE_URL
                  optional: true
            - name: CHAT_MODEL
              valueFrom:
                secretKeyRef:
                  name: consumeriq-api-keys
                  key: CHAT_MODEL
                  optional: true
            - name: CHAT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: consumeriq-api-keys
                  key: CHAT_API_KEY
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: consumeriq-api-keys
                  key: OPENAI_API_KEY
                  optional: true
            - name: COGNEE_ENABLED
              value: "false"
            - name: COGNEE_USE_LOCAL_INFERENCE
              value: "false"
            - name: COGNEE_LLM_PROVIDER
              value: "openai"
            - name: COGNEE_LLM_MODEL
              value: "gpt-4o-mini"
            - name: COGNEE_EMBEDDING_MODEL
              value: "text-embedding-3-small"
            - name: COGNEE_LOCAL_LLM_URL
              value: "http://consumeriq-inference.consumeriq.svc.cluster.local:8080/v1"
            - name: COGNEE_LOCAL_LLM_MODEL
              value: "llama-3.2-3b"
            - name: COGNEE_LOCAL_EMBEDDING_URL
              value: "http://consumeriq-embeddings.consumeriq.svc.cluster.local:8080/v1"
            - name: COGNEE_LOCAL_EMBEDDING_MODEL
              value: "paraphrase-multilingual-MiniLM-L12-v2"
            - name: COGNEE_LOCAL_EMBEDDING_DIMS
              value: "384"
            - name: COGNEE_LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: consumeriq-api-keys
                  key: OPENAI_API_KEY
                  optional: true
            - name: REDIS_URL
              value: redis://redis.consumeriq.svc.cluster.local:6379/0
            - name: DATABASE_URL
              value: postgresql://consumeriq:consumeriq@postgres.consumeriq.svc.cluster.local:5432/consumeriq
            - name: INFERENCE_URL
              value: http://consumeriq-inference.consumeriq.svc.cluster.local:8080
            - name: EMBEDDINGS_URL
              value: http://consumeriq-embeddings.consumeriq.svc.cluster.local:8080
            - name: TRANSLATOR_URL1
              value: http://consumeriq-translator.consumeriq.svc.cluster.local:8080
            - name: SCRAPINGBEE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: consumeriq-api-keys
                  key: SCRAPINGBEE_API_KEY
                  optional: true
            - name: BRIGHTDATA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: consumeriq-api-keys
                  key: BRIGHTDATA_API_TOKEN
