apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumeriq-worker-scraping
  namespace: consumeriq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumeriq-worker-scraping
  template:
    metadata:
      labels:
        app: consumeriq-worker-scraping
    spec:
      containers:
        - name: worker
          image: k3d-consumeriq-registry:5000/consumeriq-backend:local
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - backend.redis.worker.celeryApp
            - worker
            - -Q
            - scraping
            - --concurrency=4
            - -l
            - info
          env:
            - name: REDIS_URL
              value: redis://redis.consumeriq.svc.cluster.local:6379/0
            - name: DATABASE_URL
              value: postgresql://consumeriq:consumeriq@postgres.consumeriq.svc.cluster.local:5432/consumeriq
            - name: DAILY_REFRESH_ENABLED
              value: "false"
            - name: COMPLIANCE_SCRAPE_ENABLED
              value: "false"
            - name: SIGNAL_RECENCY_WEIGHT
              value: "0.005"
            - name: PIPELINE_ENABLED_MARKETPLACES
              valueFrom:
                secretKeyRef:
                  name: consumeriq-api-keys
                  key: PIPELINE_ENABLED_MARKETPLACES
                  optional: true
            - name: PIPELINE_SKIP_MARKETPLACES
              valueFrom:
                secretKeyRef:
                  name: consumeriq-api-keys
                  key: PIPELINE_SKIP_MARKETPLACES
                  optional: true
            - name: PIPELINE_SOCIAL_ENABLED
              valueFrom:
                secretKeyRef:
                  name: consumeriq-api-keys
                  key: PIPELINE_SOCIAL_ENABLED
                  optional: true
            - name: OPENAI_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: consumeriq-api-keys
                  key: OPENAI_BASE_URL
                  optional: true
            - name: OPENAI_MODEL
              valueFrom:
                secretKeyRef:
                  name: consumeriq-api-keys
                  key: OPENAI_MODEL
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: consumeriq-api-keys
                  key: OPENAI_API_KEY
                  optional: true
            - name: COGNEE_ENABLED
              value: "false"
            - name: COGNEE_USE_LOCAL_INFERENCE
              value: "false"
            - name: COGNEE_LLM_PROVIDER
              value: "openai"
            - name: COGNEE_LLM_MODEL
              value: "gpt-4o-mini"
            - name: COGNEE_EMBEDDING_MODEL
              value: "text-embedding-3-small"
            - name: COGNEE_LOCAL_LLM_URL
              value: "http://consumeriq-inference.consumeriq.svc.cluster.local:8080/v1"
            - name: COGNEE_LOCAL_LLM_MODEL
              value: "llama-3.2-3b"
            - name: COGNEE_LOCAL_EMBEDDING_URL
              value: "http://consumeriq-embeddings.consumeriq.svc.cluster.local:8080/v1"
            - name: COGNEE_LOCAL_EMBEDDING_MODEL
              value: "paraphrase-multilingual-MiniLM-L12-v2"
            - name: COGNEE_LOCAL_EMBEDDING_DIMS
              value: "384"
            - name: COGNEE_LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: consumeriq-api-keys
                  key: OPENAI_API_KEY
                  optional: true
            - name: SCRAPINGBEE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: consumeriq-api-keys
                  key: SCRAPINGBEE_API_KEY
                  optional: true
            - name: BRIGHTDATA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: consumeriq-api-keys
                  key: BRIGHTDATA_API_TOKEN
