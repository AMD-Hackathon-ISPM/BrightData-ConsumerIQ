apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: consumeriq-local
servers: 1
agents: 2
kubeAPI:
  host: "127.0.0.1"
  hostIP: "127.0.0.1"
  hostPort: "6550"
ports:
  - port: 30080:30080
    nodeFilters:
      - loadbalancer
  - port: 5432:5432
    nodeFilters:
      - server:0
  - port: 6379:6379
    nodeFilters:
      - server:0
registries:
  use:
    - k3d-consumeriq-registry:5001
options:
  runtime:
    gpuRequest: "all"
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:0
